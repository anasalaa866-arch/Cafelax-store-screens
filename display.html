<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFELAX Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
    color: #fff;
    cursor: none;
  }
  
  /* Rotator wrapper */
  #rotator {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    transform-origin: center center;
  }
  #rotator.rotate-180 { transform: rotate(180deg); }
  #rotator.rotate-90 {
    transform: rotate(90deg);
    width: 100vh;
    height: 100vw;
    top: 50%;
    left: 50%;
    margin-top: -50vw;
    margin-left: -50vh;
    inset: auto;
  }
  #rotator.rotate-270 {
    transform: rotate(-90deg);
    width: 100vh;
    height: 100vw;
    top: 50%;
    left: 50%;
    margin-top: -50vw;
    margin-left: -50vh;
    inset: auto;
  }
  
  #stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
  }
  
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    background-color: #000;
  }
  .slide.active { opacity: 1; }
  
  .slide.fit-cover {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide.fit-contain {
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide.fit-fill {
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
  }
  
  .slide video, .slide img {
    width: 100%;
    height: 100%;
    display: block;
  }
  .slide.fit-cover video, .slide.fit-cover img { object-fit: cover; }
  .slide.fit-contain video, .slide.fit-contain img { object-fit: contain; }
  .slide.fit-fill video, .slide.fit-fill img { object-fit: fill; }
  
  /* ============================================
     INVISIBLE EXIT TRIGGER (Top corners)
     ============================================ */
  .exit-zone {
    position: fixed;
    width: 80px;
    height: 80px;
    z-index: 50;
    cursor: pointer;
  }
  .exit-zone-tl { top: 0; left: 0; }
  .exit-zone-tr { top: 0; right: 0; }
  .exit-zone-bl { bottom: 0; left: 0; }
  .exit-zone-br { bottom: 0; right: 0; }
  
  /* ============================================
     SETTINGS UI
     ============================================ */
  #setup {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 5vh 5vw;
    overflow-y: auto;
  }
  #setup.hidden { display: none; }
  
  .setup-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 16px;
    padding: 5vh 4vw;
    max-width: 800px;
    width: 100%;
  }
  
  .setup-title {
    color: #d4af37;
    font-size: clamp(28px, 4vh, 48px);
    margin-bottom: 8px;
    letter-spacing: 4px;
    text-align: center;
    font-weight: 300;
  }
  .setup-subtitle {
    color: #888;
    margin-bottom: 5vh;
    font-size: clamp(14px, 1.8vh, 18px);
    text-align: center;
  }
  
  .field { margin-bottom: 3vh; }
  .field-label {
    display: block;
    color: #aaa;
    font-size: clamp(13px, 1.6vh, 16px);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  .options { display: flex; flex-wrap: wrap; gap: 10px; }
  .option {
    flex: 1;
    min-width: 120px;
    padding: 18px 24px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: clamp(15px, 2vh, 18px);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    outline: none;
    font-family: inherit;
  }
  .option.selected {
    background: rgba(212,175,55,0.15);
    border-color: rgba(212,175,55,0.5);
    color: #d4af37;
  }
  .option:focus {
    border-color: #d4af37;
    background: rgba(212,175,55,0.2);
    transform: scale(1.05);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.3);
  }
  
  .group-display {
    width: 100%;
    padding: 24px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: clamp(20px, 3vh, 28px);
    text-align: center;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: monospace;
    transition: all 0.15s;
    outline: none;
  }
  .group-display:focus {
    border-color: #d4af37;
    box-shadow: 0 0 0 3px rgba(212,175,55,0.3);
  }
  .group-display.empty { color: #555; }
  
  .save-btn {
    width: 100%;
    padding: 22px;
    background: linear-gradient(135deg, #d4af37, #b8941f);
    color: #000;
    border: 2px solid transparent;
    border-radius: 10px;
    font-size: clamp(16px, 2.2vh, 20px);
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 4vh;
    font-family: inherit;
    outline: none;
    transition: all 0.15s;
  }
  .save-btn:focus {
    transform: scale(1.02);
    box-shadow: 0 0 0 4px rgba(212,175,55,0.5);
  }
  
  .help-text {
    text-align: center;
    margin-top: 3vh;
    color: #555;
    font-size: clamp(11px, 1.4vh, 14px);
    line-height: 1.8;
  }
  .help-text kbd {
    display: inline-block;
    padding: 2px 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #d4af37;
    font-family: monospace;
    margin: 0 4px;
  }
  
  /* ============================================
     ON-SCREEN KEYBOARD
     ============================================ */
  #keyboard {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 4vh 4vw;
  }
  #keyboard.show { display: flex; }
  
  .kb-box { width: 100%; max-width: 900px; }
  .kb-display {
    width: 100%;
    padding: 24px;
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(212,175,55,0.5);
    border-radius: 10px;
    color: #d4af37;
    font-size: clamp(24px, 3.5vh, 36px);
    text-align: center;
    margin-bottom: 3vh;
    font-family: monospace;
    letter-spacing: 3px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .kb-display .cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: #d4af37;
    margin-left: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  
  .kb-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 8px;
  }
  .kb-key {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    font-size: clamp(16px, 2.5vh, 22px);
    cursor: pointer;
    outline: none;
    font-family: inherit;
    transition: all 0.1s;
  }
  .kb-key:focus {
    border-color: #d4af37;
    background: rgba(212,175,55,0.2);
    color: #d4af37;
    transform: scale(1.1);
  }
  .kb-key.action {
    background: rgba(212,175,55,0.1);
    color: #d4af37;
  }
  .kb-key.action:focus { background: rgba(212,175,55,0.3); }
  
  /* ============================================
     STATUS & INDICATORS
     ============================================ */
  #status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #status.show { opacity: 1; }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }
  .status-dot.offline { background: #f87171; }
  .status-dot.syncing { 
    background: #fbbf24;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  
  /* Schedule indicator (top of screen when active) */
  #scheduleIndicator {
    position: fixed;
    top: 12px;
    right: 12px;
    padding: 6px 14px;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    font-size: 11px;
    color: #d4af37;
    z-index: 100;
    display: none;
    align-items: center;
    gap: 6px;
  }
  #scheduleIndicator.show { display: flex; }
  
  #hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 30px;
    color: #d4af37;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    text-align: center;
  }
  #hint.show { opacity: 1; }
  
  /* PIN entry overlay */
  #pinEntry {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1500;
    flex-direction: column;
    gap: 30px;
  }
  #pinEntry.show { display: flex; }
  .pin-title {
    color: #d4af37;
    font-size: clamp(20px, 2.5vh, 28px);
    letter-spacing: 4px;
  }
  .pin-display {
    font-size: 48px;
    color: #d4af37;
    letter-spacing: 20px;
    font-family: monospace;
    min-height: 60px;
  }
  .pin-help {
    color: #666;
    font-size: 14px;
    text-align: center;
  }
  
  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 30px;
  }
  #loading.hidden { display: none; }
  .logo-loader {
    color: #d4af37;
    font-size: 32px;
    letter-spacing: 8px;
    font-weight: 300;
  }
  .loader-bar {
    width: 200px;
    height: 2px;
    background: rgba(212,175,55,0.2);
    overflow: hidden;
    border-radius: 2px;
  }
  .loader-bar::after {
    content: '';
    display: block;
    width: 30%;
    height: 100%;
    background: #d4af37;
    animation: loader 1.5s ease-in-out infinite;
  }
  @keyframes loader {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }
</style>
</head>
<body>

<!-- Invisible exit zones in 4 corners (click to open settings) -->
<div class="exit-zone exit-zone-tl" data-corner="tl"></div>
<div class="exit-zone exit-zone-tr" data-corner="tr"></div>
<div class="exit-zone exit-zone-bl" data-corner="bl"></div>
<div class="exit-zone exit-zone-br" data-corner="br"></div>

<!-- Setup screen -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-title">CAFELAX SIGNAGE</div>
    <div class="setup-subtitle">استخدم أزرار الأسهم و OK من الريموت</div>
    
    <div class="field">
      <label class="field-label">اسم المجموعة</label>
      <button class="group-display empty" id="groupDisplay" tabindex="1">
        اضغط OK لكتابة الاسم
      </button>
    </div>
    
    <div class="field">
      <label class="field-label">تدوير الشاشة</label>
      <div class="options" id="rotationOptions">
        <button class="option" data-value="0" tabindex="2">0°</button>
        <button class="option" data-value="90" tabindex="3">90°</button>
        <button class="option" data-value="180" tabindex="4">180°</button>
        <button class="option" data-value="270" tabindex="5">270°</button>
      </div>
    </div>
    
    <div class="field">
      <label class="field-label">طريقة العرض</label>
      <div class="options" id="fitOptions">
        <button class="option" data-value="cover" tabindex="6">ملء الشاشة</button>
        <button class="option" data-value="contain" tabindex="7">احتواء كامل</button>
        <button class="option" data-value="fill" tabindex="8">تمديد</button>
      </div>
    </div>
    
    <button class="save-btn" id="saveBtn" tabindex="9">START DISPLAY</button>
    
    <div class="help-text">
      التنقل: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> · 
      الاختيار: <kbd>OK</kbd>
    </div>
  </div>
</div>

<!-- On-screen keyboard -->
<div id="keyboard">
  <div class="kb-box">
    <div class="kb-display" id="kbDisplay">
      <span id="kbText"></span><span class="cursor"></span>
    </div>
    <div class="kb-grid" id="kbGrid"></div>
    <div class="help-text" style="margin-top:3vh;">
      <kbd>BACK</kbd> للخروج · <kbd>OK</kbd> للاختيار
    </div>
  </div>
</div>

<!-- PIN entry (alternative way to access settings) -->
<div id="pinEntry">
  <div class="pin-title">SETTINGS ACCESS</div>
  <div class="pin-display" id="pinDisplay"></div>
  <div class="pin-help">
    اكتب الكود: <strong style="color:#d4af37;">1234</strong><br>
    <span style="font-size:12px;opacity:0.5;">استخدم الأسهم 1=↑ 2=→ 3=↓ 4=←</span>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="hidden">
  <div class="logo-loader">CAFELAX</div>
  <div class="loader-bar"></div>
</div>

<!-- Display stage -->
<div id="rotator">
  <div id="stage"></div>
</div>

<!-- Status -->
<div id="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Online</span>
</div>

<!-- Schedule indicator -->
<div id="scheduleIndicator">
  <span>📅</span>
  <span id="scheduleName"></span>
</div>

<!-- Hint -->
<div id="hint"></div>

<script>
// ============================================
// CAFELAX TV DISPLAY
// ============================================

const CONFIG = {
  API_URL: window.location.origin + '/api',
  POLL_INTERVAL: 30000,
  HEARTBEAT_INTERVAL: 60000,
  EXIT_PIN: '1234' // الكود لفتح الإعدادات
};

let state = {
  groupName: localStorage.getItem('cafelax_group') || '',
  rotation: parseInt(localStorage.getItem('cafelax_rotation') || '0'),
  fitMode: localStorage.getItem('cafelax_fit') || 'cover',
  playlist: JSON.parse(localStorage.getItem('cafelax_playlist') || '[]'),
  playlistVersion: localStorage.getItem('cafelax_version') || '0',
  serverTimeOffset: 0,
  isOnline: navigator.onLine,
};

let tempSettings = {
  group: state.groupName,
  rotation: state.rotation,
  fit: state.fitMode
};

// ============================================
// SETTINGS UI
// ============================================
function openSettings() {
  tempSettings = {
    group: state.groupName,
    rotation: state.rotation,
    fit: state.fitMode
  };
  updateSettingsUI();
  document.getElementById('setup').classList.remove('hidden');
  setTimeout(() => document.getElementById('groupDisplay').focus(), 100);
}

function closeSettings() {
  if (state.groupName) {
    document.getElementById('setup').classList.add('hidden');
  }
}

function updateSettingsUI() {
  const gd = document.getElementById('groupDisplay');
  if (tempSettings.group) {
    gd.textContent = tempSettings.group;
    gd.classList.remove('empty');
  } else {
    gd.textContent = 'اضغط OK لكتابة الاسم';
    gd.classList.add('empty');
  }
  
  document.querySelectorAll('#rotationOptions .option').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.value) === tempSettings.rotation);
  });
  
  document.querySelectorAll('#fitOptions .option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.value === tempSettings.fit);
  });
}

document.getElementById('groupDisplay').addEventListener('click', openKeyboard);

document.querySelectorAll('#rotationOptions .option').forEach(btn => {
  btn.addEventListener('click', () => {
    tempSettings.rotation = parseInt(btn.dataset.value);
    updateSettingsUI();
  });
});

document.querySelectorAll('#fitOptions .option').forEach(btn => {
  btn.addEventListener('click', () => {
    tempSettings.fit = btn.dataset.value;
    updateSettingsUI();
  });
});

document.getElementById('saveBtn').addEventListener('click', saveSettings);

function saveSettings() {
  if (!tempSettings.group) {
    alert('من فضلك اكتب اسم المجموعة');
    return;
  }
  
  state.groupName = tempSettings.group;
  state.rotation = tempSettings.rotation;
  state.fitMode = tempSettings.fit;
  
  localStorage.setItem('cafelax_group', state.groupName);
  localStorage.setItem('cafelax_rotation', state.rotation);
  localStorage.setItem('cafelax_fit', state.fitMode);
  
  applyRotation();
  document.getElementById('setup').classList.add('hidden');
  
  // إعادة تشغيل
  state.playlistVersion = '0'; // عشان يعيد تحميل القائمة
  init();
}

function applyRotation() {
  const rotator = document.getElementById('rotator');
  rotator.classList.remove('rotate-90', 'rotate-180', 'rotate-270');
  if (state.rotation === 90) rotator.classList.add('rotate-90');
  else if (state.rotation === 180) rotator.classList.add('rotate-180');
  else if (state.rotation === 270) rotator.classList.add('rotate-270');
}

// ============================================
// ON-SCREEN KEYBOARD
// ============================================
const KB_LAYOUT = [
  ['1','2','3','4','5','6','7','8','9','0'],
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l','-'],
  ['z','x','c','v','b','n','m','_','⌫','✓']
];

function buildKeyboard() {
  const grid = document.getElementById('kbGrid');
  grid.innerHTML = '';
  let tabIdx = 100;
  
  KB_LAYOUT.flat().forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'kb-key';
    btn.textContent = key;
    btn.tabIndex = tabIdx++;
    
    if (key === '⌫') {
      btn.classList.add('action');
      btn.addEventListener('click', () => {
        tempSettings.group = tempSettings.group.slice(0, -1);
        updateKeyboardDisplay();
      });
    } else if (key === '✓') {
      btn.classList.add('action');
      btn.addEventListener('click', closeKeyboard);
    } else {
      btn.addEventListener('click', () => {
        if (tempSettings.group.length < 30) {
          tempSettings.group += key;
          updateKeyboardDisplay();
        }
      });
    }
    
    grid.appendChild(btn);
  });
}

function openKeyboard() {
  document.getElementById('keyboard').classList.add('show');
  updateKeyboardDisplay();
  setTimeout(() => {
    const keys = document.querySelectorAll('.kb-key');
    if (keys[20]) keys[20].focus();
  }, 100);
}

function closeKeyboard() {
  document.getElementById('keyboard').classList.remove('show');
  updateSettingsUI();
  setTimeout(() => document.getElementById('groupDisplay').focus(), 100);
}

function updateKeyboardDisplay() {
  document.getElementById('kbText').textContent = tempSettings.group || '';
}

buildKeyboard();

// ============================================
// MULTIPLE EXIT METHODS
// ============================================

// طريقة 1: PIN code (1234 = ↑→↓←)
let pinBuffer = '';
let pinTimer;

function showPinEntry() {
  pinBuffer = '';
  document.getElementById('pinDisplay').textContent = '';
  document.getElementById('pinEntry').classList.add('show');
  clearTimeout(pinTimer);
  pinTimer = setTimeout(() => {
    document.getElementById('pinEntry').classList.remove('show');
    pinBuffer = '';
  }, 10000);
}

function hidePinEntry() {
  document.getElementById('pinEntry').classList.remove('show');
  pinBuffer = '';
  clearTimeout(pinTimer);
}

function addPinDigit(digit) {
  pinBuffer += digit;
  document.getElementById('pinDisplay').textContent = '•'.repeat(pinBuffer.length);
  
  if (pinBuffer.length >= 4) {
    if (pinBuffer === CONFIG.EXIT_PIN) {
      hidePinEntry();
      openSettings();
    } else {
      document.getElementById('pinDisplay').textContent = '✗';
      setTimeout(() => {
        pinBuffer = '';
        document.getElementById('pinDisplay').textContent = '';
      }, 500);
    }
  }
}

// طريقة 2: ضغط أركان الشاشة 4 مرات بالتتابع
let cornerSequence = [];
let cornerTimer;

function checkCornerSequence(corner) {
  cornerSequence.push(corner);
  clearTimeout(cornerTimer);
  cornerTimer = setTimeout(() => cornerSequence = [], 3000);
  
  // الترتيب الصحيح: TL → TR → BR → BL (عكس عقارب الساعة من الأعلى)
  const correct = ['tl', 'tr', 'br', 'bl'];
  
  if (cornerSequence.length >= 4) {
    const last4 = cornerSequence.slice(-4);
    if (JSON.stringify(last4) === JSON.stringify(correct)) {
      cornerSequence = [];
      openSettings();
    } else {
      cornerSequence = [];
    }
  }
  
  showHint(`${cornerSequence.length}/4`);
}

document.querySelectorAll('.exit-zone').forEach(zone => {
  zone.addEventListener('click', () => checkCornerSequence(zone.dataset.corner));
});

// طريقة 3: العد 5 مرات على OK (الأصلية)
let okPressCount = 0;
let okPressTimer;

function handleOkPress() {
  okPressCount++;
  clearTimeout(okPressTimer);
  okPressTimer = setTimeout(() => okPressCount = 0, 2000);
  
  if (okPressCount >= 5) {
    okPressCount = 0;
    openSettings();
  } else if (okPressCount >= 2) {
    showHint(`اضغط OK ${5 - okPressCount} مرات أخرى`);
  }
}

function showHint(text) {
  const hint = document.getElementById('hint');
  hint.textContent = text;
  hint.classList.add('show');
  clearTimeout(window._hintTimeout);
  window._hintTimeout = setTimeout(() => hint.classList.remove('show'), 1500);
}

// ============================================
// REMOTE NAVIGATION
// ============================================
document.addEventListener('keydown', (e) => {
  const keyboardOpen = document.getElementById('keyboard').classList.contains('show');
  const settingsOpen = !document.getElementById('setup').classList.contains('hidden');
  const pinOpen = document.getElementById('pinEntry').classList.contains('show');
  
  // BACK button
  if (e.key === 'Escape' || e.keyCode === 461 || e.keyCode === 10009) {
    e.preventDefault();
    if (pinOpen) {
      hidePinEntry();
    } else if (keyboardOpen) {
      closeKeyboard();
    } else if (settingsOpen && state.groupName) {
      closeSettings();
    }
    return;
  }
  
  // PIN entry mode
  if (pinOpen) {
    e.preventDefault();
    if (e.key === 'ArrowUp') addPinDigit('1');
    else if (e.key === 'ArrowRight') addPinDigit('2');
    else if (e.key === 'ArrowDown') addPinDigit('3');
    else if (e.key === 'ArrowLeft') addPinDigit('4');
    return;
  }
  
  // Arrow navigation in keyboard or settings
  if (keyboardOpen && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
    handleKeyboardNav(e.key);
    return;
  }
  
  if (settingsOpen && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
    handleSettingsNav(e.key);
    return;
  }
  
  // Quick access methods (when on display)
  if (!settingsOpen && !keyboardOpen && !pinOpen) {
    // Menu button
    if (e.key === 'ContextMenu' || e.keyCode === 462 || e.keyCode === 18) {
      e.preventDefault();
      openSettings();
      return;
    }
    
    // OK pressed 5 times
    if (e.key === 'Enter') {
      handleOkPress();
    }
    
    // Long press detection - hold OK for 3 seconds
    // (handled separately below)
    
    // Color buttons on remote (Red = exit)
    // Red button keycode varies: 403, 0, etc.
    if (e.keyCode === 403 || e.key === 'F1' || e.keyCode === 116) {
      e.preventDefault();
      showPinEntry();
      return;
    }
  }
});

// Long press OK to open PIN entry
let okPressStart = null;
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !okPressStart) {
    okPressStart = Date.now();
    setTimeout(() => {
      if (okPressStart && Date.now() - okPressStart >= 2500) {
        showPinEntry();
        okPressStart = null;
      }
    }, 2500);
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') okPressStart = null;
});

function handleKeyboardNav(direction) {
  const keys = Array.from(document.querySelectorAll('.kb-key'));
  const focused = document.activeElement;
  const currentIdx = keys.indexOf(focused);
  if (currentIdx === -1) {
    keys[0].focus();
    return;
  }
  
  const cols = 10;
  let newIdx = currentIdx;
  
  if (direction === 'ArrowRight') newIdx = currentIdx + 1;
  else if (direction === 'ArrowLeft') newIdx = currentIdx - 1;
  else if (direction === 'ArrowDown') newIdx = currentIdx + cols;
  else if (direction === 'ArrowUp') newIdx = currentIdx - cols;
  
  if (newIdx >= 0 && newIdx < keys.length) {
    keys[newIdx].focus();
  }
}

function handleSettingsNav(direction) {
  const focused = document.activeElement;
  const isInGroup = focused.classList.contains('option');
  
  if (isInGroup) {
    const parent = focused.parentElement;
    const siblings = Array.from(parent.querySelectorAll('.option'));
    const siblingIdx = siblings.indexOf(focused);
    
    if (direction === 'ArrowLeft' && siblingIdx > 0) {
      siblings[siblingIdx - 1].focus();
      return;
    }
    if (direction === 'ArrowRight' && siblingIdx < siblings.length - 1) {
      siblings[siblingIdx + 1].focus();
      return;
    }
  }
  
  if (direction === 'ArrowDown') {
    if (focused.id === 'groupDisplay') {
      document.querySelector('#rotationOptions .option').focus();
    } else if (focused.parentElement.id === 'rotationOptions') {
      document.querySelector('#fitOptions .option').focus();
    } else if (focused.parentElement.id === 'fitOptions') {
      document.getElementById('saveBtn').focus();
    }
  } else if (direction === 'ArrowUp') {
    if (focused.id === 'saveBtn') {
      document.querySelector('#fitOptions .option').focus();
    } else if (focused.parentElement.id === 'fitOptions') {
      document.querySelector('#rotationOptions .option').focus();
    } else if (focused.parentElement.id === 'rotationOptions') {
      document.getElementById('groupDisplay').focus();
    }
  }
}

// ============================================
// MAIN INIT
// ============================================
async function init() {
  if (!state.groupName) {
    openSettings();
    return;
  }
  
  applyRotation();
  document.getElementById('setup').classList.add('hidden');
  
  // منع الشاشة من النوم
  preventSleep();
  
  showLoading(true);
  await syncWithServer();
  showLoading(false);
  startPlayback();
  startPolling();
  startHeartbeat();
}

// ============================================

async function preventSleep() {
  // الطريقة 1: Wake Lock API (الأحدث والأفضل)
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock active');
      
      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock released, re-acquiring...');
        // إعادة الـ wake lock تلقائياً
        setTimeout(() => preventSleep(), 1000);
      });
    } catch (err) {
      console.warn('Wake Lock failed:', err);
    }
  }
  
  // الطريقة 2: تشغيل فيديو مخفي (للأجهزة القديمة اللي مفيهاش Wake Lock)
  startSleepPreventVideo();
  
  // الطريقة 3: محاكاة حركة الماوس بشكل دوري
  startActivitySimulation();
}

      if (v.paused) v.play().catch(() => {});

    // إعادة الـ wake lock لو اتقطع
    if (!wakeLock || wakeLock.released) {

    if (!wakeLock || wakeLock.released) {
      await preventSleep();
    }
    // إعادة تشغيل أي فيديو متوقف
    document.querySelectorAll('video').forEach(v => {
      if (v.paused) v.play().catch(() => {});
    });
  }
});

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

function updateStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const el = document.getElementById('status');
  el.classList.add('show');
  
  dot.className = 'status-dot ' + (status === 'online' ? '' : status);
  text.textContent = {
    online: 'Online',
    offline: 'Offline (Cached)',
    syncing: 'Syncing...'
  }[status] || status;
  
  clearTimeout(window._statusTimeout);
  window._statusTimeout = setTimeout(() => el.classList.remove('show'), 3000);
}

function updateScheduleIndicator(scheduleName) {
  const ind = document.getElementById('scheduleIndicator');
  if (scheduleName) {
    document.getElementById('scheduleName').textContent = scheduleName;
    ind.classList.add('show');
  } else {
    ind.classList.remove('show');
  }
}

// ============================================
// SYNC WITH SERVER (with schedule support)
// ============================================
let nextScheduleChange = null;

async function syncWithServer() {
  if (!state.isOnline) return;
  updateStatus('syncing');
  
  try {
    const startTime = Date.now();
    const res = await fetch(`${CONFIG.API_URL}/playlist?group=${encodeURIComponent(state.groupName)}&v=${state.playlistVersion}`, {
      cache: 'no-store'
    });
    const latency = (Date.now() - startTime) / 2;
    
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    
    if (data.serverTime) {
      state.serverTimeOffset = data.serverTime + latency - Date.now();
    }
    
    // معالجة الـ schedule indicator
    if (data.source === 'schedule' && data.scheduleName) {
      updateScheduleIndicator(data.scheduleName);
    } else {
      updateScheduleIndicator(null);
    }
    
    // حفظ موعد التغيير القادم
    nextScheduleChange = data.nextChange;
    
    if (data.version && data.version !== state.playlistVersion) {
      state.playlist = data.playlist || [];
      state.playlistVersion = data.version;
      localStorage.setItem('cafelax_playlist', JSON.stringify(state.playlist));
      localStorage.setItem('cafelax_version', data.version);
      await preloadAssets(state.playlist);
      
      // إعادة تشغيل العرض بالمحتوى الجديد
      startPlayback();
    }
    
    updateStatus('online');
  } catch (err) {
    updateStatus('offline');
  }
}

async function preloadAssets(playlist) {
  const promises = playlist.map(item => {
    return new Promise((resolve) => {
      if (item.type === 'video') {
        const v = document.createElement('video');
        v.src = item.url;
        v.preload = 'auto';
        v.onloadeddata = resolve;
        v.onerror = resolve;
      } else {
        const img = new Image();
        img.src = item.url;
        img.onload = resolve;
        img.onerror = resolve;
      }
    });
  });
  await Promise.all(promises);
}

// ============================================
// PLAYBACK
// ============================================
function getServerTime() {
  return Date.now() + state.serverTimeOffset;
}

function calculateCurrentSlide() {
  if (!state.playlist.length) return null;
  const totalDuration = state.playlist.reduce((sum, item) => sum + (item.duration || 5000), 0);
  if (totalDuration === 0) return null;
  
  const cyclePosition = getServerTime() % totalDuration;
  let accumulated = 0;
  for (let i = 0; i < state.playlist.length; i++) {
    const dur = state.playlist[i].duration || 5000;
    if (cyclePosition < accumulated + dur) {
      return {
        index: i,
        item: state.playlist[i],
        remaining: dur - (cyclePosition - accumulated)
      };
    }
    accumulated += dur;
  }
  return null;
}

function startPlayback() {
  if (!state.playlist.length) {
    showEmptyState();
    setTimeout(startPlayback, 5000);
    return;
  }
  
  const stage = document.getElementById('stage');
  
  function showNextSlide() {
    window._lastSlideTime = Date.now();
    
    const current = calculateCurrentSlide();
    if (!current) {
      setTimeout(showNextSlide, 1000);
      return;
    }
    
    const oldSlides = stage.querySelectorAll('.slide');
    if (oldSlides.length > 2) {
      for (let i = 0; i < oldSlides.length - 1; i++) oldSlides[i].remove();
    }
    
    const slide = document.createElement('div');
    slide.className = 'slide fit-' + state.fitMode;
    
    if (current.item.type === 'video') {
      const video = document.createElement('video');
      video.src = current.item.url;
      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;
      slide.appendChild(video);
      video.play().catch(() => {});
    } else {
      slide.style.backgroundImage = `url('${current.item.url}')`;
    }
    
    stage.appendChild(slide);
    
    requestAnimationFrame(() => {
      stage.querySelectorAll('.slide.active').forEach(s => {
        if (s !== slide) s.classList.remove('active');
      });
      slide.classList.add('active');
      setTimeout(() => {
        stage.querySelectorAll('.slide:not(.active)').forEach(s => s.remove());
      }, 800);
    });
    
    setTimeout(showNextSlide, current.remaining);
  }
  
  showNextSlide();
}

function showEmptyState() {
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;background:#000;">
      <div style="color:#d4af37;font-size:48px;letter-spacing:8px;font-weight:300;">CAFELAX</div>
      <div style="color:#666;font-size:14px;">في انتظار المحتوى... (${state.groupName})</div>
    </div>
  `;
}

// ============================================
// POLLING & HEARTBEAT
// ============================================
function startPolling() {
  setInterval(() => {
    if (state.isOnline) {
      syncWithServer();
      
      // Check إذا كنا قريبين من schedule change
      if (nextScheduleChange) {
        const timeUntil = nextScheduleChange - Date.now();
        // لو في خلال 30 ثانية، اعمل sync فوراً
        if (timeUntil > 0 && timeUntil < 30000) {
          setTimeout(syncWithServer, timeUntil + 1000);
        }
      }
    }
  }, CONFIG.POLL_INTERVAL);
}

function startHeartbeat() {
  const sendHeartbeat = async () => {
    if (!state.isOnline) return;
    try {
      await fetch(`${CONFIG.API_URL}/heartbeat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          group: state.groupName,
          version: state.playlistVersion,
          timestamp: Date.now()
        })
      });
    } catch (e) {}
  };
  sendHeartbeat();
  setInterval(sendHeartbeat, CONFIG.HEARTBEAT_INTERVAL);
}

// ============================================
// AUTO-RECOVERY
// ============================================
window.addEventListener('online', () => {
  state.isOnline = true;
  updateStatus('online');
  syncWithServer();
});
window.addEventListener('offline', () => {
  state.isOnline = false;
  updateStatus('offline');
});

setInterval(() => {
  if (window._lastSlideTime && Date.now() - window._lastSlideTime > 120000) {
    startPlayback();
  }
}, 30000);

setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);

// ============================================
// START
// ============================================
init();
</script>
