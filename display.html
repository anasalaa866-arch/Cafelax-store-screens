<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFELAX Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
    color: #fff;
    cursor: none;
  }
  
  #rotator {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    transform-origin: center center;
  }
  #rotator.rotate-180 { transform: rotate(180deg); }
  #rotator.rotate-90 {
    transform: rotate(90deg);
    width: 100vh; height: 100vw;
    top: 50%; left: 50%;
    margin-top: -50vw; margin-left: -50vh;
    inset: auto;
  }
  #rotator.rotate-270 {
    transform: rotate(-90deg);
    width: 100vh; height: 100vw;
    top: 50%; left: 50%;
    margin-top: -50vw; margin-left: -50vh;
    inset: auto;
  }
  
  #stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
  }
  
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    background-color: #000;
  }
  .slide.active { opacity: 1; }
  
  .slide.fit-cover {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide.fit-contain {
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide.fit-fill {
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
  }
  
  .slide video, .slide img {
    width: 100%;
    height: 100%;
    display: block;
  }
  .slide.fit-cover video, .slide.fit-cover img { object-fit: cover; }
  .slide.fit-contain video, .slide.fit-contain img { object-fit: contain; }
  .slide.fit-fill video, .slide.fit-fill img { object-fit: fill; }
  
  /* Welcome / Empty state */
  #welcomeScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    flex-direction: column;
    gap: 30px;
    padding: 5vh 5vw;
    text-align: center;
  }
  #welcomeScreen.hidden { display: none; }
  
  .welcome-logo {
    color: #d4af37;
    font-size: clamp(40px, 6vh, 64px);
    letter-spacing: 8px;
    font-weight: 300;
    margin-bottom: 20px;
  }
  
  .welcome-card {
    background: rgba(212,175,55,0.05);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 16px;
    padding: 4vh 4vw;
    max-width: 600px;
    width: 100%;
  }
  .welcome-card h2 {
    color: #d4af37;
    font-size: clamp(18px, 2.5vh, 24px);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .welcome-card p {
    color: #aaa;
    font-size: clamp(14px, 1.8vh, 17px);
    line-height: 1.8;
    margin-bottom: 12px;
  }
  .welcome-card .screen-id {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 10px;
    padding: 16px 24px;
    color: #d4af37;
    font-family: monospace;
    font-size: clamp(20px, 3vh, 28px);
    letter-spacing: 4px;
    margin: 20px 0;
    display: inline-block;
  }
  .welcome-card .ip-info {
    color: #888;
    font-size: 13px;
    margin-top: 16px;
  }
  
  /* Settings */
  #setup {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 5vh 5vw;
    overflow-y: auto;
  }
  #setup.hidden { display: none; }
  
  .setup-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 16px;
    padding: 5vh 4vw;
    max-width: 800px;
    width: 100%;
  }
  
  .setup-title {
    color: #d4af37;
    font-size: clamp(28px, 4vh, 48px);
    margin-bottom: 8px;
    letter-spacing: 4px;
    text-align: center;
    font-weight: 300;
  }
  .setup-subtitle {
    color: #888;
    margin-bottom: 5vh;
    font-size: clamp(14px, 1.8vh, 18px);
    text-align: center;
  }
  
  .field { margin-bottom: 3vh; }
  .field-label {
    display: block;
    color: #aaa;
    font-size: clamp(13px, 1.6vh, 16px);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  .options { display: flex; flex-wrap: wrap; gap: 10px; }
  .option {
    flex: 1;
    min-width: 120px;
    padding: 18px 24px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: clamp(15px, 2vh, 18px);
    cursor: pointer;
    text-align: center;
    outline: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .option.selected {
    background: rgba(212,175,55,0.15);
    border-color: rgba(212,175,55,0.5);
    color: #d4af37;
  }
  .option:focus {
    border-color: #d4af37;
    transform: scale(1.05);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.3);
  }
  
  .save-btn {
    width: 100%;
    padding: 22px;
    background: linear-gradient(135deg, #d4af37, #b8941f);
    color: #000;
    border: 2px solid transparent;
    border-radius: 10px;
    font-size: clamp(16px, 2.2vh, 20px);
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 4vh;
    font-family: inherit;
    outline: none;
  }
  .save-btn:focus {
    transform: scale(1.02);
    box-shadow: 0 0 0 4px rgba(212,175,55,0.5);
  }
  
  .help-text {
    text-align: center;
    margin-top: 3vh;
    color: #555;
    font-size: clamp(11px, 1.4vh, 14px);
    line-height: 1.8;
  }
  .help-text kbd {
    display: inline-block;
    padding: 2px 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #d4af37;
    font-family: monospace;
    margin: 0 4px;
  }
  
  /* Indicators */
  #status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #status.show { opacity: 1; }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }
  .status-dot.offline { background: #f87171; }
  .status-dot.syncing { 
    background: #fbbf24;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  
  #scheduleIndicator {
    position: fixed;
    top: 12px;
    right: 12px;
    padding: 6px 14px;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    font-size: 11px;
    color: #d4af37;
    z-index: 100;
    display: none;
    align-items: center;
    gap: 6px;
  }
  #scheduleIndicator.show { display: flex; }
  
  /* Hint */
  #hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(212,175,55,0.5);
    border-radius: 30px;
    color: #d4af37;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #hint.show { opacity: 1; }
  
  /* PIN entry */
  #pinEntry {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1500;
    flex-direction: column;
    gap: 30px;
  }
  #pinEntry.show { display: flex; }
  .pin-title {
    color: #d4af37;
    font-size: clamp(20px, 2.5vh, 28px);
    letter-spacing: 4px;
  }
  .pin-display {
    font-size: 48px;
    color: #d4af37;
    letter-spacing: 20px;
    font-family: monospace;
    min-height: 60px;
  }
  .pin-help {
    color: #666;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Welcome screen (when not assigned to a playlist) -->
<div id="welcomeScreen" class="hidden">
  <div class="welcome-logo">CAFELAX</div>
  <div class="welcome-card">
    <h2>SCREEN READY</h2>
    <p>هذه الشاشة مسجلة وفي انتظار تخصيصها لقائمة عرض</p>
    <p>افتح لوحة التحكم وحدد قائمة العرض لهذه الشاشة:</p>
    <div class="screen-id" id="welcomeScreenId">--</div>
    <div class="ip-info" id="welcomeIp">--</div>
  </div>
</div>

<!-- Settings (rotation/fit only - no group anymore) -->
<div id="setup" class="hidden">
  <div class="setup-box">
    <div class="setup-title">SCREEN SETTINGS</div>
    <div class="setup-subtitle">إعدادات الشاشة</div>
    
    <div class="field">
      <label class="field-label">Screen ID</label>
      <div style="background:rgba(0,0,0,0.5);border:1px solid rgba(212,175,55,0.3);padding:16px;border-radius:10px;text-align:center;color:#d4af37;font-family:monospace;letter-spacing:3px;font-size:18px;" id="settingsScreenId">--</div>
    </div>
    
    <div class="field">
      <label class="field-label">تدوير الشاشة</label>
      <div class="options" id="rotationOptions">
        <button class="option" data-value="0" tabindex="1">0°</button>
        <button class="option" data-value="90" tabindex="2">90°</button>
        <button class="option" data-value="180" tabindex="3">180°</button>
        <button class="option" data-value="270" tabindex="4">270°</button>
      </div>
    </div>
    
    <div class="field">
      <label class="field-label">طريقة العرض</label>
      <div class="options" id="fitOptions">
        <button class="option" data-value="cover" tabindex="5">ملء الشاشة</button>
        <button class="option" data-value="contain" tabindex="6">احتواء كامل</button>
        <button class="option" data-value="fill" tabindex="7">تمديد</button>
      </div>
    </div>
    
    <button class="save-btn" id="saveBtn" tabindex="8">SAVE & APPLY</button>
    
    <div class="help-text">
      التنقل: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> · 
      الاختيار: <kbd>OK</kbd> · 
      الخروج: <kbd>BACK</kbd>
    </div>
  </div>
</div>

<!-- PIN Entry -->
<div id="pinEntry">
  <div class="pin-title">SETTINGS ACCESS</div>
  <div class="pin-display" id="pinDisplay"></div>
  <div class="pin-help">
    اكتب الكود: <strong style="color:#d4af37;">1234</strong><br>
    <span style="font-size:12px;opacity:0.5;">1=↑ 2=→ 3=↓ 4=←</span>
  </div>
</div>

<!-- Display stage -->
<div id="rotator">
  <div id="stage"></div>
</div>

<!-- Indicators -->
<div id="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Online</span>
</div>

<div id="scheduleIndicator">
  <span>📅</span>
  <span id="scheduleName"></span>
</div>

<div id="hint"></div>

<script>
// ============================================
// CAFELAX TV DISPLAY v2
// ============================================

const CONFIG = {
  API_URL: window.location.origin + '/api',
  POLL_INTERVAL: 30000,
  HEARTBEAT_INTERVAL: 60000,
  EXIT_PIN: '1234'
};

let state = {
  screenId: localStorage.getItem('cafelax_screenId') || null,
  rotation: parseInt(localStorage.getItem('cafelax_rotation') || '0'),
  fitMode: localStorage.getItem('cafelax_fit') || 'cover',
  playlist: JSON.parse(localStorage.getItem('cafelax_playlist') || '[]'),
  playlistVersion: localStorage.getItem('cafelax_version') || '0',
  serverTimeOffset: 0,
  isOnline: navigator.onLine,
  registered: false,
  hasPlaylist: false
};

let tempSettings = { rotation: state.rotation, fit: state.fitMode };

// ============================================
// REGISTRATION & SYNC
// ============================================
async function registerScreen() {
  try {
    const res = await fetch(`${CONFIG.API_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        rotation: state.rotation,
        fitMode: state.fitMode
      })
    });
    
    if (!res.ok) throw new Error('Registration failed');
    const data = await res.json();
    
    state.screenId = data.screenId;
    localStorage.setItem('cafelax_screenId', data.screenId);
    
    if (data.config) {
      // Apply server config (overrides local)
      if (data.config.rotation !== undefined) state.rotation = data.config.rotation;
      if (data.config.fitMode) state.fitMode = data.config.fitMode;
    }
    
    return true;
  } catch (err) {
    console.warn('Registration failed:', err);
    return false;
  }
}

async function syncWithServer() {
  if (!state.isOnline || !state.screenId) return;
  updateStatus('syncing');
  
  try {
    const startTime = Date.now();
    const res = await fetch(
      `${CONFIG.API_URL}/screen/config?screenId=${state.screenId}&v=${state.playlistVersion}`,
      { cache: 'no-store' }
    );
    const latency = (Date.now() - startTime) / 2;
    
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    
    if (data.serverTime) {
      state.serverTimeOffset = data.serverTime + latency - Date.now();
    }
    
    if (!data.registered) {
      // Re-register
      await registerScreen();
      return;
    }
    
    state.registered = true;
    
    // Apply config from server
    let configChanged = false;
    if (data.rotation !== undefined && data.rotation !== state.rotation) {
      state.rotation = data.rotation;
      localStorage.setItem('cafelax_rotation', state.rotation);
      configChanged = true;
    }
    if (data.fitMode && data.fitMode !== state.fitMode) {
      state.fitMode = data.fitMode;
      localStorage.setItem('cafelax_fit', state.fitMode);
      configChanged = true;
    }
    if (configChanged) applyRotation();
    
    // Schedule indicator
    if (data.source === 'schedule' && data.scheduleName) {
      updateScheduleIndicator(data.scheduleName);
    } else {
      updateScheduleIndicator(null);
    }
    
    // Update playlist if changed
    if (data.version && data.version !== state.playlistVersion) {
      state.playlist = data.playlist || [];
      state.playlistVersion = data.version;
      localStorage.setItem('cafelax_playlist', JSON.stringify(state.playlist));
      localStorage.setItem('cafelax_version', data.version);
      await preloadAssets(state.playlist);
      
      // Restart playback
      state.hasPlaylist = state.playlist.length > 0;
      if (state.hasPlaylist) {
        document.getElementById('welcomeScreen').classList.add('hidden');
        startPlayback();
      } else {
        showWelcomeScreen();
      }
    } else if (state.playlist.length === 0) {
      showWelcomeScreen();
    } else if (!state.hasPlaylist) {
      state.hasPlaylist = true;
      document.getElementById('welcomeScreen').classList.add('hidden');
      startPlayback();
    }
    
    updateStatus('online');
  } catch (err) {
    console.warn('Sync failed:', err.message);
    updateStatus('offline');
  }
}

async function preloadAssets(playlist) {
  const promises = playlist.map(item => {
    return new Promise((resolve) => {
      if (item.type === 'video') {
        const v = document.createElement('video');
        v.src = item.url;
        v.preload = 'auto';
        v.onloadeddata = resolve;
        v.onerror = resolve;
      } else {
        const img = new Image();
        img.src = item.url;
        img.onload = resolve;
        img.onerror = resolve;
      }
    });
  });
  await Promise.all(promises);
}

// ============================================
// WELCOME SCREEN
// ============================================
async function showWelcomeScreen() {
  state.hasPlaylist = false;
  
  // Get IP
  let ip = '--';
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    ip = data.ip;
  } catch(e) {}
  
  document.getElementById('welcomeScreenId').textContent = state.screenId || '--';
  document.getElementById('welcomeIp').textContent = `IP: ${ip}`;
  document.getElementById('settingsScreenId').textContent = state.screenId || '--';
  
  document.getElementById('welcomeScreen').classList.remove('hidden');
}

// ============================================
// SETTINGS
// ============================================
function openSettings() {
  tempSettings = { rotation: state.rotation, fit: state.fitMode };
  updateSettingsUI();
  document.getElementById('settingsScreenId').textContent = state.screenId || '--';
  document.getElementById('setup').classList.remove('hidden');
  setTimeout(() => document.querySelector('#rotationOptions .option').focus(), 100);
}

function closeSettings() {
  document.getElementById('setup').classList.add('hidden');
}

function updateSettingsUI() {
  document.querySelectorAll('#rotationOptions .option').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.value) === tempSettings.rotation);
  });
  document.querySelectorAll('#fitOptions .option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.value === tempSettings.fit);
  });
}

document.querySelectorAll('#rotationOptions .option').forEach(btn => {
  btn.addEventListener('click', () => {
    tempSettings.rotation = parseInt(btn.dataset.value);
    updateSettingsUI();
  });
});

document.querySelectorAll('#fitOptions .option').forEach(btn => {
  btn.addEventListener('click', () => {
    tempSettings.fit = btn.dataset.value;
    updateSettingsUI();
  });
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  state.rotation = tempSettings.rotation;
  state.fitMode = tempSettings.fit;
  
  localStorage.setItem('cafelax_rotation', state.rotation);
  localStorage.setItem('cafelax_fit', state.fitMode);
  
  applyRotation();
  closeSettings();
  
  // Update on server too
  await registerScreen();
});

function applyRotation() {
  const rotator = document.getElementById('rotator');
  rotator.classList.remove('rotate-90', 'rotate-180', 'rotate-270');
  if (state.rotation === 90) rotator.classList.add('rotate-90');
  else if (state.rotation === 180) rotator.classList.add('rotate-180');
  else if (state.rotation === 270) rotator.classList.add('rotate-270');
}

// ============================================
// EXIT METHODS
// ============================================
let pinBuffer = '';
let pinTimer;

function showPinEntry() {
  pinBuffer = '';
  document.getElementById('pinDisplay').textContent = '';
  document.getElementById('pinEntry').classList.add('show');
  clearTimeout(pinTimer);
  pinTimer = setTimeout(hidePinEntry, 10000);
}

function hidePinEntry() {
  document.getElementById('pinEntry').classList.remove('show');
  pinBuffer = '';
  clearTimeout(pinTimer);
}

function addPinDigit(d) {
  pinBuffer += d;
  document.getElementById('pinDisplay').textContent = '•'.repeat(pinBuffer.length);
  
  if (pinBuffer.length >= 4) {
    if (pinBuffer === CONFIG.EXIT_PIN) {
      hidePinEntry();
      openSettings();
    } else {
      document.getElementById('pinDisplay').textContent = '✗';
      setTimeout(() => {
        pinBuffer = '';
        document.getElementById('pinDisplay').textContent = '';
      }, 500);
    }
  }
}

let okPressCount = 0;
let okPressTimer;

function handleOkPress() {
  okPressCount++;
  clearTimeout(okPressTimer);
  okPressTimer = setTimeout(() => okPressCount = 0, 2000);
  
  if (okPressCount >= 5) {
    okPressCount = 0;
    openSettings();
  } else if (okPressCount >= 2) {
    showHint(`اضغط OK ${5 - okPressCount} مرات أخرى`);
  }
}

function showHint(text) {
  const hint = document.getElementById('hint');
  hint.textContent = text;
  hint.classList.add('show');
  clearTimeout(window._hintTimeout);
  window._hintTimeout = setTimeout(() => hint.classList.remove('show'), 1500);
}

// Long press OK
let okPressStart = null;

document.addEventListener('keydown', (e) => {
  const settingsOpen = !document.getElementById('setup').classList.contains('hidden');
  const pinOpen = document.getElementById('pinEntry').classList.contains('show');
  
  // BACK
  if (e.key === 'Escape' || e.keyCode === 461 || e.keyCode === 10009) {
    e.preventDefault();
    if (pinOpen) hidePinEntry();
    else if (settingsOpen) closeSettings();
    return;
  }
  
  // PIN entry
  if (pinOpen) {
    e.preventDefault();
    if (e.key === 'ArrowUp') addPinDigit('1');
    else if (e.key === 'ArrowRight') addPinDigit('2');
    else if (e.key === 'ArrowDown') addPinDigit('3');
    else if (e.key === 'ArrowLeft') addPinDigit('4');
    return;
  }
  
  // Settings nav
  if (settingsOpen && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
    handleSettingsNav(e.key);
    return;
  }
  
  // Quick access
  if (!settingsOpen && !pinOpen) {
    if (e.key === 'ContextMenu' || e.keyCode === 462 || e.keyCode === 18) {
      e.preventDefault();
      openSettings();
      return;
    }
    if (e.keyCode === 403 || e.key === 'F1' || e.keyCode === 116) {
      e.preventDefault();
      showPinEntry();
      return;
    }
    if (e.key === 'Enter') {
      handleOkPress();
      if (!okPressStart) {
        okPressStart = Date.now();
        setTimeout(() => {
          if (okPressStart && Date.now() - okPressStart >= 2500) {
            showPinEntry();
            okPressStart = null;
          }
        }, 2500);
      }
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') okPressStart = null;
});

function handleSettingsNav(direction) {
  const focused = document.activeElement;
  const isInGroup = focused.classList.contains('option');
  
  if (isInGroup) {
    const parent = focused.parentElement;
    const siblings = Array.from(parent.querySelectorAll('.option'));
    const idx = siblings.indexOf(focused);
    
    if (direction === 'ArrowLeft' && idx > 0) {
      siblings[idx - 1].focus();
      return;
    }
    if (direction === 'ArrowRight' && idx < siblings.length - 1) {
      siblings[idx + 1].focus();
      return;
    }
  }
  
  if (direction === 'ArrowDown') {
    if (focused.parentElement.id === 'rotationOptions') {
      document.querySelector('#fitOptions .option').focus();
    } else if (focused.parentElement.id === 'fitOptions') {
      document.getElementById('saveBtn').focus();
    }
  } else if (direction === 'ArrowUp') {
    if (focused.id === 'saveBtn') {
      document.querySelector('#fitOptions .option').focus();
    } else if (focused.parentElement.id === 'fitOptions') {
      document.querySelector('#rotationOptions .option').focus();
    }
  }
}

// ============================================
// PREVENT SLEEP
// ============================================
let wakeLock = null;
let sleepPreventVideo = null;

async function preventSleep() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        setTimeout(() => preventSleep(), 1000);
      });
    } catch (err) {}
  }
  startSleepPreventVideo();
  startActivitySimulation();
}

function startSleepPreventVideo() {
  if (sleepPreventVideo) return;
  
  sleepPreventVideo = document.createElement('video');
  sleepPreventVideo.muted = true;
  sleepPreventVideo.loop = true;
  sleepPreventVideo.setAttribute('playsinline', '');
  sleepPreventVideo.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1;left:0;top:0;';
  
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 64, 64);
  
  if (canvas.captureStream) {
    sleepPreventVideo.srcObject = canvas.captureStream(1);
    document.body.appendChild(sleepPreventVideo);
    sleepPreventVideo.play().catch(() => {});
  }
}

function startActivitySimulation() {
  setInterval(() => {
    document.querySelectorAll('video').forEach(v => {
      if (v.paused) v.play().catch(() => {});
    });
    if (!wakeLock || wakeLock.released) preventSleep();
  }, 30000);
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    if (!wakeLock || wakeLock.released) await preventSleep();
    document.querySelectorAll('video').forEach(v => {
      if (v.paused) v.play().catch(() => {});
    });
  }
});

// ============================================
// PLAYBACK
// ============================================
function getServerTime() {
  return Date.now() + state.serverTimeOffset;
}

function calculateCurrentSlide() {
  if (!state.playlist.length) return null;
  const totalDuration = state.playlist.reduce((sum, item) => sum + (item.duration || 5000), 0);
  if (totalDuration === 0) return null;
  
  const cyclePosition = getServerTime() % totalDuration;
  let accumulated = 0;
  for (let i = 0; i < state.playlist.length; i++) {
    const dur = state.playlist[i].duration || 5000;
    if (cyclePosition < accumulated + dur) {
      return {
        index: i,
        item: state.playlist[i],
        remaining: dur - (cyclePosition - accumulated)
      };
    }
    accumulated += dur;
  }
  return null;
}

function startPlayback() {
  if (!state.playlist.length) {
    showWelcomeScreen();
    return;
  }
  
  const stage = document.getElementById('stage');
  
  function showNextSlide() {
    window._lastSlideTime = Date.now();
    
    const current = calculateCurrentSlide();
    if (!current) {
      setTimeout(showNextSlide, 1000);
      return;
    }
    
    const oldSlides = stage.querySelectorAll('.slide');
    if (oldSlides.length > 2) {
      for (let i = 0; i < oldSlides.length - 1; i++) oldSlides[i].remove();
    }
    
    const slide = document.createElement('div');
    slide.className = 'slide fit-' + state.fitMode;
    
    if (current.item.type === 'video') {
      const video = document.createElement('video');
      video.src = current.item.url;
      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;
      slide.appendChild(video);
      video.play().catch(() => {});
    } else {
      slide.style.backgroundImage = `url('${current.item.url}')`;
    }
    
    stage.appendChild(slide);
    
    requestAnimationFrame(() => {
      stage.querySelectorAll('.slide.active').forEach(s => {
        if (s !== slide) s.classList.remove('active');
      });
      slide.classList.add('active');
      setTimeout(() => {
        stage.querySelectorAll('.slide:not(.active)').forEach(s => s.remove());
      }, 800);
    });
    
    setTimeout(showNextSlide, current.remaining);
  }
  
  showNextSlide();
}

// ============================================
// STATUS
// ============================================
function updateStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const el = document.getElementById('status');
  el.classList.add('show');
  
  dot.className = 'status-dot ' + (status === 'online' ? '' : status);
  text.textContent = {
    online: 'Online',
    offline: 'Offline',
    syncing: 'Syncing'
  }[status] || status;
  
  clearTimeout(window._statusTimeout);
  window._statusTimeout = setTimeout(() => el.classList.remove('show'), 3000);
}

function updateScheduleIndicator(name) {
  const ind = document.getElementById('scheduleIndicator');
  if (name) {
    document.getElementById('scheduleName').textContent = name;
    ind.classList.add('show');
  } else {
    ind.classList.remove('show');
  }
}

// ============================================
// HEARTBEAT
// ============================================
function startHeartbeat() {
  const send = async () => {
    if (!state.isOnline || !state.screenId) return;
    try {
      await fetch(`${CONFIG.API_URL}/heartbeat`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'X-Screen-Id': state.screenId
        },
        body: JSON.stringify({ timestamp: Date.now() })
      });
    } catch (e) {}
  };
  send();
  setInterval(send, CONFIG.HEARTBEAT_INTERVAL);
}

// ============================================
// MAIN INIT
// ============================================
async function init() {
  // Register screen on first visit
  if (!state.screenId) {
    await registerScreen();
  }
  
  applyRotation();
  preventSleep();
  
  await syncWithServer();
  
  setInterval(() => {
    if (state.isOnline) syncWithServer();
  }, CONFIG.POLL_INTERVAL);
  
  startHeartbeat();
}

// Online/offline
window.addEventListener('online', () => {
  state.isOnline = true;
  updateStatus('online');
  syncWithServer();
});
window.addEventListener('offline', () => {
  state.isOnline = false;
  updateStatus('offline');
});

// Watchdog
setInterval(() => {
  if (state.hasPlaylist && window._lastSlideTime && Date.now() - window._lastSlideTime > 120000) {
    startPlayback();
  }
}, 30000);

// Auto-refresh every 6 hours
setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);

init();
</script>
